server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Don't serve dotfiles (e.g. any .git left in the image).
    location ~ /\. { deny all; }

    # Versioned assets: cache forever. nginx ignores the query string when
    # matching, so js/main.js?v=<sha> is served immutable; browsers + Cloudflare
    # key on the full URL incl. ?v=, so the next deploy's new ?v= is an automatic
    # miss and refetch.
    location ~* \.(?:js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html + everything else: always revalidate, never stale. Cheap — a
    # 304 (no body) is returned when unchanged.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
